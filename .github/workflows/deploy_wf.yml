name: Deploy Terraform
on:
  push:
    branches:
      - main

jobs:
  Runner-Setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Configure AWS Credentials 2
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1
      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: ssh setup
        run: |
          sleep 30
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/mein_schlüssel
          chmod 600 ~/.ssh/mein_schlüssel
          for ip in $(terraform output -json public_ip | jq -r ".[]"); do
            ssh-keyscan -H $ip >> ~/.ssh/known_hosts || echo "ssh-keyscan failed for $ip, continuing..."
          done

      - name: install nginx
        run: |
          for ip in $(terraform output -json public_ip | jq -r ".[]"); do
            ok=false
            for retry in 1 2 3; do
              if ssh -i ~/.ssh/mein_schlüssel -o StrictHostKeyChecking=no ubuntu@$ip "sudo apt update && sudo apt install nginx -y"; then
                ok=true
                break
              fi
              echo "SSH to $ip failed (attempt $retry), retrying in 10s..."
              sleep 10
            done
            if [ "$ok" = false ]; then
              echo "Failed to install nginx on $ip after 3 attempts"
              exit 1
            fi
          done

      - name: deploy website
        run: |
          for ip in $(terraform output -json public_ip | jq -r ".[]"); do
            if ! cat index.html | ssh -i ~/.ssh/mein_schlüssel -o StrictHostKeyChecking=no ubuntu@$ip "sudo tee /var/www/html/index.html > /dev/null"; then
              echo "Failed to deploy to $ip"
              exit 1
            fi
          done
